name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"  
  workflow_dispatch:     

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write     

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=aprozo&show_icons=true&hide_border=true&include_all_commits=true&count_private=true&theme=transparent
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=aprozo&layout=compact&langs_count=8&hide_border=true&theme=transparent
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README cards" || exit 0
          git push
